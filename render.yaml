services:
  # ── Backend: FastAPI ──────────────────────────────────────────────
  - type: web
    name: ppc-agent-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false          # Set to your frontend Render URL
      - key: ENVIRONMENT
        value: production
    healthCheckPath: /health

  # ── Frontend: React/Vite Static Site ─────────────────────────────
  - type: web
    name: ppc-agent-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to your backend Render URL (e.g. https://ppc-agent-api.onrender.com)
